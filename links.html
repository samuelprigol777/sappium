<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel Prigol | Sappium — Links</title>
    <meta name="description" content="Links do Samuel Prigol, estrategista digital e fundador da Sappium. Tráfego pago, landing pages e CRMs sob medida.">
    <meta name="author" content="Samuel Prigol">

    <!-- Open Graph -->
    <meta property="og:title" content="Samuel Prigol | Sappium — Links">
    <meta property="og:description" content="Links do Samuel Prigol, estrategista digital e fundador da Sappium. Tráfego pago, landing pages e CRMs sob medida.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sappium.com.br/links">
    <meta property="og:image" content="https://sappium.com.br/logo.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:site_name" content="Sappium">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Samuel Prigol | Sappium — Links">
    <meta name="twitter:description" content="Links do Samuel Prigol, estrategista digital e fundador da Sappium.">
    <meta name="twitter:image" content="https://sappium.com.br/logo.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #06060b;
            --bg-secondary: #0c0c14;
            --accent: #ef4444;
            --accent-light: #f97316;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.08);
            --gradient: linear-gradient(135deg, #ef4444, #f97316);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle background glow */
        body::before {
            content: '';
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(239, 68, 68, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            position: relative;
            z-index: 1;
        }

        /* ── Profile Section ── */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            text-align: center;
        }

        .photo-wrapper {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            padding: 3px;
            background: var(--gradient);
            animation: pulse-border 3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-border {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3);
            }
            50% {
                box-shadow: 0 0 20px 4px rgba(239, 68, 68, 0.15);
            }
        }

        .photo-wrapper img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-primary);
            display: block;
        }

        .profile-name {
            font-family: 'Poppins', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .profile-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.4;
        }

        .profile-location {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        /* ── Links Section ── */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .link-item {
            opacity: 0;
            transform: translateY(16px);
            animation: fade-in 0.5s ease forwards;
        }

        .link-item:nth-child(1) { animation-delay: 0.1s; }
        .link-item:nth-child(2) { animation-delay: 0.2s; }
        .link-item:nth-child(3) { animation-delay: 0.3s; }
        .link-item:nth-child(4) { animation-delay: 0.4s; }
        .link-item:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fade-in {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* Default style: border with transparent bg */
        .link-btn--default {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border);
            color: var(--text-primary);
        }

        .link-btn--default:hover {
            background: var(--gradient);
            border-color: transparent;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.25);
        }

        /* Primary CTA style: gradient bg always */
        .link-btn--primary {
            background: var(--gradient);
            border: 1.5px solid transparent;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
        }

        .link-btn--primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(239, 68, 68, 0.35);
            filter: brightness(1.1);
        }

        .link-emoji {
            font-size: 1.15rem;
            flex-shrink: 0;
        }

        /* ── Footer ── */
        .footer {
            margin-top: 16px;
            text-align: center;
            opacity: 0;
            animation: fade-in 0.5s ease forwards;
            animation-delay: 0.7s;
        }

        .footer-logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .footer-copy {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            body {
                padding: 32px 16px;
            }

            .profile-name {
                font-size: 1.35rem;
            }

            .link-btn {
                padding: 15px 20px;
                font-size: 0.9rem;
            }

            .link-btn--primary {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile -->
        <div class="profile">
            <div class="photo-wrapper">
                <img src="IMG_3396.jpg" alt="Samuel Prigol" width="110" height="110">
            </div>
            <h1 class="profile-name">Samuel Prigol</h1>
            <p class="profile-subtitle">Estrategista Digital | Sappium</p>
            <p class="profile-location">📍 Erechim/RS</p>
        </div>

        <!-- Links -->
        <nav class="links" aria-label="Links principais">
            <div class="link-item">
                <a href="https://sappium.com.br" class="link-btn link-btn--default" target="_blank" rel="noopener noreferrer">
                    <span class="link-emoji">🌐</span>
                    Conheça a Sappium
                </a>
            </div>
            <div class="link-item">
                <a href="https://wa.me/5554999999999" class="link-btn link-btn--default" target="_blank" rel="noopener noreferrer">
                    <span class="link-emoji">📱</span>
                    WhatsApp
                </a>
            </div>
            <div class="link-item">
                <a href="https://sappium.com.br/#formulario" class="link-btn link-btn--primary" target="_blank" rel="noopener noreferrer">
                    <span class="link-emoji">📊</span>
                    Solicitar Orçamento Grátis
                </a>
            </div>
            <div class="link-item">
                <a href="https://instagram.com/samuelprigol" class="link-btn link-btn--default" target="_blank" rel="noopener noreferrer">
                    <span class="link-emoji">📸</span>
                    Instagram @samuelprigol
                </a>
            </div>
            <div class="link-item">
                <a href="https://instagram.com/sappium_agencia" class="link-btn link-btn--default" target="_blank" rel="noopener noreferrer">
                    <span class="link-emoji">💼</span>
                    Instagram @sappium_agencia
                </a>
            </div>
        </nav>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-logo">sappium</div>
            <p class="footer-copy">&copy; 2026 Sappium &mdash; Soluções Digitais</p>
        </footer>
    </div>
</body>
</html>
